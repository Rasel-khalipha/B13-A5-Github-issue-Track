<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- Title and Favicon -->
		<title>GitHub Issue Tracker</title>
		<link
			rel="shortcut icon"
			href="./assets/github-logo.png"
			type="image/x-icon"
		/>

		<!-- Google Fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
			rel="stylesheet"
		/>
		<!-- Stylesheet -->
		<link rel="stylesheet" href="./style/style.css" />

		<!-- Tailwind and DaisyUI -->
		<link
			href="https://cdn.jsdelivr.net/npm/daisyui@5"
			rel="stylesheet"
			type="text/css"
		/>
		<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

		<!-- Font Awesome -->
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
			integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
			crossorigin="anonymous"
			referrerpolicy="no-referrer"
		/>
	</head>
	<body class="bg-[#F8FAFC]">
		<header class="py-4 border-b border-[#E4E4E7] bg-white">
			<div class="navbar w-full md:w-11/12 mx-auto flex-col md:flex-row gap-10">
				<div class="flex-1">
					<a class="flex items-center">
						<img
							src="./assets/github-logo.png"
							alt="GitHub Logo"
							class="w-12"
						/>
						<span class="ml-1 font-semibold text-2xl text-[#1F2937]">
							GitHub Issues Tracker
						</span>
					</a>
				</div>
				<div class="flex gap-2 relative">
					<i
						class="fa-solid fa-magnifying-glass absolute top-1 left-2 translate-y-1/2 z-10 text-[#64748B] cursor-pointer"
					></i>
					<input
						id="input-search"
						type="text"
						placeholder="Search issues..."
						class="input border border-[#E4E4E7] rounded pl-8"
					/>
					<div class="">
						<button
							id="btn-search"
							tabindex="0"
							role="button"
							class="btn bg-[#4A00FF] flex items-center w-[140px]"
						>
							<i class="fa-solid fa-plus text-white"></i>
							<span class="text-white font-semibold text-base"> New Issue</span>
						</button>
					</div>
				</div>
			</div>
		</header>
		<main class="max-w-[1110px] mx-auto">
			<section
				class="mt-[60px] mb-[16px] flex gap-2 bg-white p-6 rounded-lg box-shadow-btn justify-center md:justify-start"
			>
				<button
					onclick="toggleBtnStyle('all-btn')"
					id="all-btn"
					class="btn bg-[#4A00FF] text-white w-28 md:w-[120px]"
				>
					All
				</button>
				<button
					onclick="toggleBtnStyle('open-btn')"
					id="open-btn"
					class="btn w-28 md:w-[120px]"
				>
					Open
				</button>
				<button
					onclick="toggleBtnStyle('closed-btn')"
					id="closed-btn"
					class="btn w-28 md:w-[120px]"
				>
					Closed
				</button>
			</section>

			<section class="rounded-lg w-full">
				<div
					class="flex flex-col md:flex-row md:justify-between items-center bg-white rounded-t-lg box-shadow-btn p-6 border-b border-[#E4E4E7] space-y-5"
				>
					<div id="count-area">
						<div
							class="flex flex-col md:flex-row md:justify-center items-center gap-2"
						>
							<div
								class="flex justify-center items-center w-[50px] h-[50px] rounded-full bg-[#Ece4ff]"
							>
								<img src="./assets/Aperture.png" alt="aperture" />
							</div>
							<div class="text-center md:text-start space-y-2">
								<h2 class="font-semibold text-xl text-[#1F2937]">
									<span id="total-count"></span> Issues
								</h2>
								<p class="font-normal text-base text-[#64748B]">
									Track and manage your project issues
								</p>
							</div>
						</div>
					</div>
					<div class="flex justify-center items-center gap-4">
						<div class="flex justify-center items-center gap-2">
							<span
								class="w-3 h-3 rounded-full bg-[#00A96E] inline-block"
							></span>
							<p>Open</p>
						</div>
						<div class="flex justify-center items-center gap-2">
							<span
								class="w-3 h-3 rounded-full bg-[#A855F7] inline-block"
							></span>
							<p>Closed</p>
						</div>
					</div>
				</div>
				<div
					id="card-container"
					class="p-6 grid grid-cols-1 md:grid-cols-3 card-box-shadow gap-5 auto-rows-fr place-items-center"
				></div>

				<div id="spinner" class="flex justify-center items-center py-10 hidden">
					<span class="loading loading-spinner loading-xl"></span>
				</div>
			</section>

			<section
				id="modal-spinner"
				class="flex justify-center items-center py-10 hidden"
			>
				<span class="loading loading-spinner loading-xl"></span>
			</section>

			<!-- Open the modal using ID.showModal() method -->
			<!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
			<dialog id="issue_detail" class="modal modal-bottom sm:modal-middle">
				<div class="modal-box">
					<div id="issue-detail"></div>
					<div class="modal-action">
						<form method="dialog">
							<!-- if there is a button in form, it will close the modal -->
							<button class="btn btn-primary outline-none border-none">
								Close
							</button>
						</form>
					</div>
				</div>
			</dialog>
		</main>

		<script src="./script/dashboard.js"></script>
	</body>
</html>
